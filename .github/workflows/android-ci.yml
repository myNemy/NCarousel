name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# With an explicit permissions block, every scope omitted is denied. Artifact upload
# requires actions:write (see GitHub docs: storing workflow data as artifacts).
permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Runner images define this; set explicitly so Gradle always sees the SDK even if a step alters env.
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build-debug:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # Without this, each runner generates a new debug.keystore → every artifact has a different
      # signature and Android requires uninstall before installing a newer APK from Actions.
      - name: Configure stable debug signing (optional repository secrets)
        env:
          KEYSTORE_B64: ${{ secrets.NCAROUSEL_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.NCAROUSEL_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.NCAROUSEL_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.NCAROUSEL_KEY_PASSWORD }}
        run: |
          set -e
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::Secrets NCAROUSEL_* not set: debug APK signature changes each CI run; uninstall before sideloading a new build. See README (GitHub Actions APK)."
            exit 0
          fi
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::NCAROUSEL_KEYSTORE_B64 is set but KEYSTORE_PASSWORD, KEY_ALIAS or KEY_PASSWORD is missing."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$GITHUB_WORKSPACE/app/ncarousel-ci.keystore"
          {
            echo "NCAROUSEL_SIGNING_STORE_FILE=$GITHUB_WORKSPACE/app/ncarousel-ci.keystore"
            echo "NCAROUSEL_SIGNING_STORE_PASSWORD=$KEYSTORE_PASSWORD"
            echo "NCAROUSEL_SIGNING_KEY_ALIAS=$KEY_ALIAS"
            echo "NCAROUSEL_SIGNING_KEY_PASSWORD=$KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      # v6 runs on Node 24 by default (not v5 / Node 20).
      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  # After a green build on main, ensure git tag v<ncarouselBaseVersionName> exists on GitHub (and
  # optionally Forgejo). Skips if the tag already exists on origin.
  release-tag:
    name: Release tag
    needs: build-debug
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push release tag if missing
        env:
          FORGEJO_PUSH_TOKEN: ${{ secrets.FORGEJO_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(grep -E '^\s*val ncarouselBaseVersionName\s*=' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "${VERSION}" ]; then
            echo "::error::Could not parse ncarouselBaseVersionName from app/build.gradle.kts"
            exit 1
          fi
          TAG="v${VERSION}"
          git fetch --tags origin
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on this clone (fetched from origin); nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${VERSION}"
          git push origin "${TAG}"
          echo "Pushed ${TAG} to origin."
          if [ -n "${FORGEJO_PUSH_TOKEN}" ]; then
            FORGEJO_URL="https://oauth2:${FORGEJO_PUSH_TOKEN}@forgejo.it/Nemeyes/NCarousel.git"
            git remote remove forgejo 2>/dev/null || true
            git remote add forgejo "${FORGEJO_URL}"
            git push forgejo "${TAG}"
            echo "Pushed ${TAG} to forgejo."
          else
            echo "::notice::Secret FORGEJO_PUSH_TOKEN not set; skipping tag push to Forgejo. Add a Forgejo PAT with repo scope to mirror release tags."
          fi
