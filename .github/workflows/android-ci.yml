name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# With an explicit permissions block, every scope omitted is denied. Artifact upload
# requires actions:write (see GitHub docs: storing workflow data as artifacts).
permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Runner images define this; set explicitly so Gradle always sees the SDK even if a step alters env.
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build-debug:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # Without this, each runner generates a new debug.keystore → every artifact has a different
      # signature and Android requires uninstall before installing a newer APK from Actions.
      - name: Configure stable debug signing (optional repository secrets)
        env:
          KEYSTORE_B64: ${{ secrets.NCAROUSEL_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.NCAROUSEL_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.NCAROUSEL_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.NCAROUSEL_KEY_PASSWORD }}
        run: |
          set -e
          if [ -z "$KEYSTORE_B64" ]; then
            echo "HAS_CI_KEYSTORE=false" >> "$GITHUB_ENV"
            echo "::warning::Secrets NCAROUSEL_* not set: debug APK signature changes each CI run; uninstall before sideloading a new build. No release APK will be produced (release requires the same keystore). See docs/DEVELOPMENT.md."
            exit 0
          fi
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::NCAROUSEL_KEYSTORE_B64 is set but KEYSTORE_PASSWORD, KEY_ALIAS or KEY_PASSWORD is missing."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$GITHUB_WORKSPACE/app/ncarousel-ci.keystore"
          {
            echo "NCAROUSEL_SIGNING_STORE_FILE=$GITHUB_WORKSPACE/app/ncarousel-ci.keystore"
            echo "NCAROUSEL_SIGNING_STORE_PASSWORD=$KEYSTORE_PASSWORD"
            echo "NCAROUSEL_SIGNING_KEY_ALIAS=$KEY_ALIAS"
            echo "NCAROUSEL_SIGNING_KEY_PASSWORD=$KEY_PASSWORD"
            echo "HAS_CI_KEYSTORE=true"
          } >> "$GITHUB_ENV"

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      # Release build (minified config off; signed with CI keystore when secrets are set — same as debug).
      - name: Build release APK
        if: env.HAS_CI_KEYSTORE == 'true'
        run: ./gradlew :app:assembleRelease --no-daemon

      # v6 runs on Node 24 by default (not v5 / Node 20).
      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        if: env.HAS_CI_KEYSTORE == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  # After a green build on main: ensure git tag v<ncarouselBaseVersionName>, push to Forgejo if
  # configured, then create or update a GitHub Release with APK assets (release + debug when built).
  release-tag:
    name: Release tag and GitHub Release
    needs: build-debug
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download debug APK from build job
        uses: actions/download-artifact@v6
        with:
          name: app-debug-apk
          path: release-apk

      - name: Download release APK from build job
        id: download_release
        continue-on-error: true
        uses: actions/download-artifact@v6
        with:
          name: app-release-apk
          path: release-apk-rel

      - name: Tag, push remotes, publish GitHub Release with APK
        env:
          FORGEJO_PUSH_TOKEN: ${{ secrets.FORGEJO_PUSH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          APK_DEBUG=$(find release-apk -name '*.apk' -print -quit)
          if [ -z "${APK_DEBUG}" ] || [ ! -f "${APK_DEBUG}" ]; then
            echo "::error::No debug APK found under release-apk/"
            exit 1
          fi
          VERSION=$(grep -E '^\s*val ncarouselBaseVersionName\s*=' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "${VERSION}" ]; then
            echo "::error::Could not parse ncarouselBaseVersionName from app/build.gradle.kts"
            exit 1
          fi
          DEST_DEBUG="release-apk/NCarousel-${VERSION}-debug.apk"
          cp -f "${APK_DEBUG}" "${DEST_DEBUG}"
          DEST_RELEASE=""
          if [ "${{ steps.download_release.outcome }}" = "success" ]; then
            APK_REL=$(find release-apk-rel -name '*.apk' -print -quit)
            if [ -n "${APK_REL}" ] && [ -f "${APK_REL}" ]; then
              DEST_RELEASE="release-apk/NCarousel-${VERSION}.apk"
              cp -f "${APK_REL}" "${DEST_RELEASE}"
              echo "Release APK will be attached as NCarousel-${VERSION}.apk"
            fi
          fi
          TAG="v${VERSION}"

          git fetch --tags origin
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin; skipping tag creation."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "Release ${VERSION}"
            git push origin "${TAG}"
            echo "Pushed ${TAG} to origin."
            if [ -n "${FORGEJO_PUSH_TOKEN:-}" ]; then
              FORGEJO_URL="https://oauth2:${FORGEJO_PUSH_TOKEN}@forgejo.it/Nemeyes/NCarousel.git"
              git remote remove forgejo 2>/dev/null || true
              git remote add forgejo "${FORGEJO_URL}"
              git push forgejo "${TAG}"
              echo "Pushed ${TAG} to forgejo."
            else
              echo "::notice::Secret FORGEJO_PUSH_TOKEN not set; skipping tag push to Forgejo."
            fi
          fi

          ASSETS=( "${DEST_DEBUG}" )
          if [ -n "${DEST_RELEASE}" ] && [ -f "${DEST_RELEASE}" ]; then
            ASSETS+=( "${DEST_RELEASE}" )
          fi
          RELEASE_TITLE="NCarousel ${VERSION} (CI #${{ github.run_number }})"
          if gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            echo "Updating assets on existing release ${TAG} (same tag as ncarouselBaseVersionName in build.gradle.kts)."
            echo "::notice::No new Releases list entry is created until you bump ncarouselBaseVersionName; APKs on this tag are replaced."
            for f in "${ASSETS[@]}"; do
              gh release upload "${TAG}" "${f}" --clobber --repo "${REPO}"
            done
            gh release edit "${TAG}" --repo "${REPO}" --title "${RELEASE_TITLE}"
          else
            echo "Creating GitHub Release ${TAG} with APK asset(s)."
            gh release create "${TAG}" "${ASSETS[@]}" \
              --repo "${REPO}" \
              --title "${RELEASE_TITLE}" \
              --generate-notes
          fi
